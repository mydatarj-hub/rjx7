name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ استنساخ المشروع
      - uses: actions/checkout@v4

      # 2️⃣ تثبيت بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ تثبيت Flutter مسبقًا لتجنب أي سؤال تفاعلي
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'

      # 4️⃣ تثبيت Flet
      - name: Install Flet
        run: pip install flet

      # 5️⃣ بناء APK
      - name: Build APK
        run: flet build apk --verbose

      # 6️⃣ رفع APK كـ Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/rjx7.apk
